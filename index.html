<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/input.css" />
    <title>facebook - Log-in or sign up</title>
  </head>
  <body>
    <div class="bg-blue-100 min-h-screen">
      <div
        class="container mx-auto flex flex-col gap-6 items-center justify-center md:flex-row sm:p-8"
      >
        <!-- text section -->
        <section class="mt-10 md:mt-60 max-w-75 sm:max-w-none">
          <h1 class="text-blue-500 text-5xl font-bold">facebook</h1>
          <p class="text-2xl max-w-112.5 font-semibold">
            facebook helps you connect and share with the people in your life
          </p>
        </section>
        <!-- log in section -->
        <section
          class="max-w-75 bg-white p-6 mt-10 rounded-lg w-120 shadow-gray-700 md:mt-60 sm:max-w-none"
        >
          <form class="flex flex-col gap-y-2.5" action="#">
            <input
              type="email"
              name=""
              id=""
              placeholder="Email address or phone number"
              class="px-4 py-2 rounded-lg border border-gray-200 cursor-pointer outline-blue-200 sm:py-4"
            />
            <input
              type="password"
              placeholder="password"
              class="px-4 py-2 rounded-lg border border-gray-200 cursor-pointer outline-blue-200 sm:py-4"
            />
            <button type="button"
              class="bg-blue-500 text-white font-semibold py-1 mt-5 rounded-lg text-xl cursor-pointer hover:bg-blue-600 sm:p-2"
            >
              Log in
            </button>
            <span
              class="text-center text-indigo-500 mt-0.5 mb-2.5 rounded-lg cursor-pointer hover:underline"
              >Forgotten password?
            </span>
            <hr class="text-gray-500" />
            <button type="button"
              class="bg-green-500 py-2 text-white font-semibold rounded-lg w-fit px-3 container mx-auto mt-2.5 hover:bg-green-600 sm:py-3"
            >
              Create New Account
            </button>
          </form>
        </section>
      </div>
    </div>
  </body>
</html>
